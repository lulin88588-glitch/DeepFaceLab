name: TensorFlow modern compatibility

on:
  push:
  pull_request:

jobs:
  tensorflow-221:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-blackwell-container.txt
            requirements-modern.txt
      - name: Install TensorFlow 2.21 test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install tensorflow==2.21.0
          python -m pip install -r requirements-blackwell-container.txt
      - name: Compile Python sources
        run: >-
          python -m compileall -q core facelib mainscripts merger models
          samplelib tests blackwell_support.py main.py verify_rtx5090.py
          verify_tensorflow_build.py verify_blackwell_training.py
      - name: Run Leras compatibility regression
        run: python -m unittest tests.test_blackwell_support tests.test_leras_tf_compat -v
      - name: Check CLI startup
        run: python main.py --help
